<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Individual Marks | SMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h2>🔍 Individual Student Marks</h2>
        <a th:href="@{/marks}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="form-card">
        <form th:action="@{/marks/individual}" method="post">
            <div class="form-group">
                <label for="regNo">Enter Registration Number</label>
                <input type="text" id="regNo" name="regNo"
                       class="form-control" placeholder="e.g. ICT/2021/001" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">🔍 Search</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
