<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student | SMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h2>➕ Add a Student</h2>
        <a th:href="@{/student}" class="btn btn-secondary">← Back to Student Operations</a>
    </div>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="form-card">
        <form th:action="@{/student/add}" method="post" th:object="${student}">
            <div class="form-group">
                <label for="regNo">Registration Number *</label>
                <input type="text" id="regNo" th:field="*{regNo}"
                       class="form-control" placeholder="e.g. ICT/2021/001" required>
            </div>
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" th:field="*{name}"
                       class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" th:field="*{dob}"
                       class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-control" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label for="contact">Contact Number *</label>
                <input type="text" id="contact" th:field="*{contact}"
                       class="form-control" placeholder="e.g. 0771234567" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Save Student</button>
                <a th:href="@{/student}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
